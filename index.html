<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designs by Nadia Boghani</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #046307;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 2rem 1rem 1rem;
        }
        header h1 {
            font-size: 2rem;
            letter-spacing: 0.05em;
        }
        #filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            padding: 1rem 2rem;
        }
        .filter-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s, border-color 0.2s;
        }
        .filter-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .filter-btn.active {
            background: #fff;
            color: #046307;
            border-color: #fff;
            font-weight: 600;
        }
        #posts {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
            padding: 1.5rem 2rem 3rem;
        }
        .post-card {
            background: rgba(255,255,255,0.1);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: transform 0.15s, opacity 0.3s;
        }
        .post-card:hover { transform: translateY(-3px); }
        .post-card.hidden { display: none; }
        .post-card a {
            display: block;
            padding: 1.2rem;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            line-height: 1.4;
        }
        .post-card a:hover { text-decoration: underline; }
        .post-tags {
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .post-tag {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.18);
            padding: 0.15rem 0.55rem;
            border-radius: 1rem;
            opacity: 0.8;
        }
        #loading { text-align: center; padding: 3rem; font-size: 1.1rem; opacity: 0.7; }
    </style>
</head>
<body>
    <header>
        <h1>Designs by Nadia Boghani</h1>
    </header>
    <div id="filters"></div>
    <div id="loading">Loading posts...</div>
    <div id="posts"></div>

    <script>
        const SHEET_ID = '1uTWL28T3jzGTydy9su69BAPbIRiv5QpA0nmVsPRcHD4';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        function parseCSV(text) {
            const rows = [];
            let current = '';
            let inQuotes = false;
            let row = [];
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (inQuotes) {
                    if (ch === '"' && text[i + 1] === '"') { current += '"'; i++; }
                    else if (ch === '"') { inQuotes = false; }
                    else { current += ch; }
                } else {
                    if (ch === '"') { inQuotes = true; }
                    else if (ch === ',') { row.push(current.trim()); current = ''; }
                    else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                        row.push(current.trim()); current = ''; rows.push(row); row = [];
                        if (ch === '\r') i++;
                    } else { current += ch; }
                }
            }
            if (current || row.length) { row.push(current.trim()); rows.push(row); }
            return rows;
        }

        async function loadData() {
            const resp = await fetch(CSV_URL);
            const text = await resp.text();
            const rows = parseCSV(text);

            // Row 2 (index 1) has headers
            const headers = rows[1].map(h => h.toLowerCase());
            const linkIdx = headers.indexOf('link');
            const titleIdx = headers.indexOf('title');
            const tagsIdx = headers.indexOf('tags');

            const posts = [];
            for (let i = 2; i < rows.length; i++) {
                const r = rows[i];
                const link = r[linkIdx] || '';
                if (!link.startsWith('http')) continue;
                const title = (titleIdx >= 0 ? r[titleIdx] : '') || link;
                const tagsRaw = (tagsIdx >= 0 ? r[tagsIdx] : '') || '';
                const tags = tagsRaw.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
                posts.push({ link, title, tags });
            }
            return posts;
        }

        function render(posts) {
            document.getElementById('loading').style.display = 'none';

            // Collect all unique tags, sorted a-z
            const tagSet = new Set();
            posts.forEach(p => p.tags.forEach(t => tagSet.add(t)));
            const allTags = [...tagSet].sort();

            const filtersEl = document.getElementById('filters');
            const activeTags = new Set();
            const btnMap = {};

            // Read initial filters from URL
            const urlParams = new URLSearchParams(window.location.search);
            const initialTags = (urlParams.get('tags') || '').split(',').map(t => t.trim().toLowerCase()).filter(Boolean);

            allTags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = tag;
                btnMap[tag] = btn;
                if (initialTags.includes(tag)) {
                    activeTags.add(tag);
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    if (activeTags.has(tag)) {
                        activeTags.delete(tag);
                        btn.classList.remove('active');
                    } else {
                        activeTags.add(tag);
                        btn.classList.add('active');
                    }
                    updateURL();
                    applyFilters();
                });
                filtersEl.appendChild(btn);
            });

            const postsEl = document.getElementById('posts');
            const cards = [];

            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.dataset.tags = JSON.stringify(p.tags);

                const a = document.createElement('a');
                a.href = p.link;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = p.title;
                card.appendChild(a);

                if (p.tags.length) {
                    const tagsDiv = document.createElement('div');
                    tagsDiv.className = 'post-tags';
                    p.tags.forEach(t => {
                        const span = document.createElement('span');
                        span.className = 'post-tag';
                        span.textContent = t;
                        tagsDiv.appendChild(span);
                    });
                    card.appendChild(tagsDiv);
                }

                postsEl.appendChild(card);
                cards.push(card);
            });

            function updateURL() {
                const params = new URLSearchParams(window.location.search);
                if (activeTags.size > 0) {
                    params.set('tags', [...activeTags].sort().join(','));
                } else {
                    params.delete('tags');
                }
                const qs = params.toString();
                const newURL = window.location.pathname + (qs ? '?' + qs : '');
                history.replaceState(null, '', newURL);
            }

            function applyFilters() {
                cards.forEach(card => {
                    if (activeTags.size === 0) {
                        card.classList.remove('hidden');
                        return;
                    }
                    const cardTags = JSON.parse(card.dataset.tags);
                    const match = cardTags.some(t => activeTags.has(t));
                    card.classList.toggle('hidden', !match);
                });
            }

            applyFilters();
        }

        loadData().then(render).catch(err => {
            document.getElementById('loading').textContent = 'Failed to load data.';
            console.error(err);
        });
    </script>
</body>
</html>
